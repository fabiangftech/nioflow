<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>nio-flow — typed pipelines on an event loop</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="description" content="nio-flow: a fluent, typed pipeline API over an event-loop engine for Java. Business logic that changes at runtime.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='9' cy='16' r='6' fill='%234F46E5'/><circle cx='23' cy='16' r='6' fill='%230891B2'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --ink: #0F172A;
      --ink-soft: #475569;
      --paper: #FFFFFF;
      --mist: #F1F5F9;
      --line: #E2E8F0;
      --boss: #4F46E5;      /* orchestration: indigo  */
      --boss-soft: #EEF2FF;
      --worker: #0891B2;    /* execution: cyan        */
      --worker-soft: #E0F7FA;
      --display: 'Inter', -apple-system, sans-serif;
      --body: 'Inter', -apple-system, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;

      /* docsify theme hooks */
      --theme-color: #4F46E5;
    }

    body {
      font-family: var(--body);
      color: var(--ink);
      background: var(--paper);
      font-size: 15.5px;
      line-height: 1.7;
    }

    /* ============ Cover ============ */
    section.cover {
      background: var(--paper) !important;
      color: var(--ink);
    }
    section.cover .cover-main {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 24px;
    }
    section.cover h1 {
      font-family: var(--display);
      font-weight: 800;
      font-size: clamp(3rem, 11vw, 4.8rem);
      letter-spacing: -0.05em;
      line-height: 1.05;
      color: var(--ink);
      margin: 0 0 10px;
    }
    section.cover h1 .flow-accent {
      background: linear-gradient(92deg, var(--boss) 15%, var(--worker) 90%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: var(--boss); /* fallback */
    }
    section.cover h1 a:hover { text-decoration: none; }
    section.cover blockquote {
      border: 0;
      margin: 0 0 8px;
    }
    section.cover blockquote p {
      font-size: clamp(1.05rem, 2.4vw, 1.3rem);
      color: var(--ink-soft);
      font-weight: 400;
      line-height: 1.55;
      margin: 0;
    }
    section.cover ul {
      max-width: none;
      color: var(--ink-soft);
    }
    /* High specificity on purpose: vue.css styles cover buttons through
       `.cover-main > p:last-child a` and `a:last-child` — beat both. */
    section.cover .cover-main > p.cover-actions a,
    section.cover .cover-main > p.cover-actions a:last-child {
      border-radius: 10px;
      font-family: var(--display);
      font-weight: 600;
      font-size: 0.95rem;
      letter-spacing: 0;
      padding: 0.7em 1.6em;
      transition: transform .15s ease, box-shadow .15s ease;
      background: var(--paper);
      border: 1px solid var(--line);
      color: var(--ink);
    }
    section.cover .cover-main > p.cover-actions a:first-child {
      background: var(--boss);
      border-color: var(--boss);
      color: #fff;
      box-shadow: 0 8px 24px rgba(79, 70, 229, .25);
    }
    section.cover .cover-main > p.cover-actions a:hover {
      transform: translateY(-2px);
      opacity: 1;
    }
    section.cover .mask { display: none; }
    section.cover .cover-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 26px;
    }
    section.cover .cover-actions a {
      display: inline-block;
      text-decoration: none;
    }
    /* Install one-liner on the cover */
    section.cover pre {
      display: inline-flex;
      align-items: stretch;
      max-width: 100%;
      margin: 30px auto 6px;
      padding: 0;
      background: #F8FAFC;
      border: 1px solid var(--line);
      border-radius: 12px;
      text-align: left;
    }
    section.cover pre > code {
      display: block;
      overflow-x: auto;
      padding: 14px 20px;
      font-family: var(--mono);
      font-size: 13.5px;
      background: transparent;
      color: #1E293B;
    }
    .cover-copy {
      flex: none;
      border: 0;
      border-left: 1px solid var(--line);
      border-radius: 0 12px 12px 0;
      background: transparent;
      padding: 0 16px;
      font-family: var(--body);
      font-size: 12px;
      font-weight: 600;
      color: var(--boss);
      cursor: pointer;
    }
    .cover-copy:hover { background: var(--boss-soft); }

    /* Signature: the pipeline strip. Indigo pills = boss-side links
       (routing decisions); cyan pills = stages on virtual workers. A
       value pulses through the chain. */
    .pipeline {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0;
      row-gap: 10px;
      margin: 34px 0 38px;
      font-family: var(--mono);
      font-size: 0.78rem;
    }
    .pipeline .stage {
      position: relative;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid var(--line);
      background: var(--mist);
      color: var(--ink-soft);
      white-space: nowrap;
    }
    .pipeline .stage.worker {
      border-color: rgba(8, 145, 178, .45);
      background: var(--worker-soft);
      color: #0E7490;
    }
    .pipeline .stage.boss {
      border-color: rgba(79, 70, 229, .45);
      background: var(--boss-soft);
      color: var(--boss);
    }
    .pipeline .link {
      width: 26px;
      height: 1.5px;
      background: var(--line);
      position: relative;
      flex: none;
    }
    .pipeline .link::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      width: 7px;
      height: 7px;
      margin-top: -3.5px;
      border-radius: 50%;
      background: var(--boss);
      opacity: 0;
      animation: travel 5.6s linear infinite;
      animation-delay: var(--d, 0s);
    }
    @keyframes travel {
      0%   { opacity: 0; transform: translateX(0); }
      3%   { opacity: 1; }
      12%  { opacity: 1; transform: translateX(19px); }
      15%  { opacity: 0; transform: translateX(19px); }
      100% { opacity: 0; transform: translateX(19px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .pipeline .link::after { animation: none; opacity: 0; }
    }

    /* ============ Navbar ============ */
    nav.app-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 58px;
      margin: 0;
      padding: 0 28px;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, .85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--line);
      z-index: 40;
    }
    .nav-brand {
      order: -1;
      display: flex;
      align-items: center;
      margin-right: 26px;
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: -0.03em;
      color: var(--ink);
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-brand::before {
      content: '';
      width: 22px;
      height: 22px;
      margin-right: auto;
      background: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='9' cy='16' r='6' fill='%234F46E5'/><circle cx='23' cy='16' r='6' fill='%230891B2'/></svg>") no-repeat center / contain;
    }
    .nav-brand span { color: var(--boss); }
    .nav-brand:hover { opacity: .85; }
    nav.app-nav ul {
      flex: 1;
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 4px;
      margin: 0;
      padding: 0;
    }
    /* GitHub icon rides the right edge */
    nav.app-nav li:last-child { margin-left: auto; }
    nav.app-nav a.nav-github {
      display: flex;
      align-items: center;
      padding: 8px;
      border-radius: 999px;
      color: var(--ink-soft);
    }
    nav.app-nav a.nav-github:hover { color: var(--ink); background: var(--mist); }
    nav.app-nav li { display: block; flex: none; margin: 0; padding: 0; }
    nav.app-nav li a { white-space: nowrap; }
    nav.app-nav li a {
      display: block;
      padding: 7px 13px;
      border-radius: 8px;
      color: var(--ink-soft);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
    }
    nav.app-nav li a:hover { background: var(--mist); color: var(--ink); }
    nav.app-nav li a.active {
      color: var(--boss);
      background: var(--boss-soft);
      border-bottom: none;
    }
    @media (max-width: 640px) {
      nav.app-nav { padding: 0 16px; }
      /* Everything else lives in the sidebar and the cover buttons:
         keep the bar to brand + the GitHub icon. */
      nav.app-nav li { display: none; }
      nav.app-nav li:last-child { display: block; }
    }

    /* Everything sits below the fixed bar */
    section.cover { padding-top: 58px; box-sizing: border-box; }
    .sidebar { top: 58px; }
    .content { top: 58px; }

    /* ============ Sidebar ============ */
    .sidebar {
      background: var(--mist);
      border-right: 1px solid var(--line);
      padding: 28px 0 40px;
    }
    /* The fixed navbar already carries the brand. */
    .sidebar > h1 { display: none; }
    .sidebar ul li a {
      color: var(--ink-soft);
      font-size: 14px;
      font-weight: 450;
    }
    .sidebar ul li a:hover { color: var(--ink); text-decoration: none; }
    .sidebar ul li.active > a {
      color: var(--boss);
      border-right: 2px solid var(--boss);
      font-weight: 600;
    }
    .sidebar ul li ul { padding-left: 12px; }
    /* Section headers in the sidebar (bold list items without links) */
    .sidebar ul li strong {
      display: block;
      font-family: var(--display);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #94A3B8;
      margin: 22px 0 4px;
    }
    .sidebar-toggle {
      background: rgba(255, 255, 255, .92);
      border-radius: 0 12px 0 0;
      border-top: 1px solid var(--line);
      border-right: 1px solid var(--line);
    }
    .sidebar-toggle span { background-color: var(--boss); }

    /* ============ Content ============ */
    .markdown-section {
      max-width: 760px;
      padding: 40px 28px 80px;
    }
    .markdown-section h1, .markdown-section h2, .markdown-section h3 {
      font-family: var(--display);
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .markdown-section h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.035em; }
    .markdown-section h2 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-top: 2.6em;
      padding-top: 1.2em;
      border-top: 1px solid var(--line);
    }
    .markdown-section h3 { font-size: 1.12rem; font-weight: 600; margin-top: 2em; }
    .markdown-section p, .markdown-section li { color: #334155; }
    .markdown-section strong { color: var(--ink); }
    .markdown-section a {
      color: var(--boss);
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1px solid rgba(79, 70, 229, .3);
    }
    .markdown-section a:hover { border-bottom-color: var(--boss); text-decoration: none; }
    /* Heading anchors are links too: keep them looking like headings. */
    .markdown-section h1 a, .markdown-section h2 a, .markdown-section h3 a,
    .markdown-section h4 a, .markdown-section h5 a {
      color: inherit;
      border-bottom: none;
    }

    .markdown-section code {
      font-family: var(--mono);
      font-size: .82em;
      background: var(--boss-soft);
      color: #4338CA;
      border-radius: 5px;
      padding: 2.5px 6px;
    }
    .markdown-section pre {
      background: #F8FAFC;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0;
    }
    .markdown-section pre > code {
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.65;
      background: transparent;
      color: #1E293B;
      padding: 1.1em 1.3em;
    }
    /* Prism (light) */
    .token.keyword { color: #7C3AED; }
    .token.string { color: #0E7490; }
    .token.function { color: #4338CA; }
    .token.class-name { color: #0F172A; font-weight: 600; }
    .token.comment { color: #94A3B8; font-style: italic; }
    .token.number { color: #B45309; }
    .token.annotation, .token.punctuation { color: #64748B; }
    .token.operator { color: #475569; background: transparent; }

    .markdown-section blockquote {
      border-left: 3px solid var(--boss);
      background: var(--boss-soft);
      border-radius: 0 10px 10px 0;
      padding: 2px 20px;
      color: var(--ink-soft);
      margin: 1.6em 0;
    }
    .markdown-section blockquote p { color: #3730A3; font-size: .95em; }

    .markdown-section table {
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-collapse: collapse;
      font-size: .9em;
    }
    @media (min-width: 769px) {
      .markdown-section table { display: table; width: 100%; }
    }
    .markdown-section table th {
      font-family: var(--display);
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--ink-soft);
      background: var(--mist);
      border: 1px solid var(--line);
    }
    .markdown-section table td { border: 1px solid var(--line); }
    .markdown-section table tr:nth-child(2n) { background: #FAFBFD; }

    .markdown-section .mermaid {
      overflow-x: auto;
      background: #FAFBFD;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px 10px;
      margin: 1.6em 0;
      text-align: center;
    }
    .markdown-section .mermaid svg { max-width: 100%; }

    /* copy-code button */
    .docsify-copy-code-button {
      background: var(--boss) !important;
      font-family: var(--body) !important;
      font-size: .7em !important;
      border-radius: 0 10px 0 10px !important;
    }

    /* search */
    .search { border-bottom: 1px solid var(--line); margin-bottom: 6px; padding: 0 18px 14px; }
    .search input {
      background: var(--paper);
      border: 1px solid var(--line) !important;
      border-radius: 8px;
      padding: 7px 10px;
      font-family: var(--body);
      font-size: 13px;
    }
    .search input:focus { border-color: var(--boss) !important; box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
    .search .matching-post { border-bottom: 1px solid var(--line); }
    .search h2 { font-size: 14px; color: var(--boss); }

    /* github corner */
    .github-corner svg { fill: var(--boss); }

    :focus-visible { outline: 2px solid var(--boss); outline-offset: 2px; }

    @media (max-width: 768px) {
      .markdown-section { padding: 24px 16px 56px; }
      .markdown-section pre > code { font-size: 12.5px; }

      section.cover .cover-main { padding: 0 22px; width: 100%; }
      section.cover h1 { font-size: clamp(2.5rem, 13vw, 3.2rem); margin-bottom: 12px; }
      section.cover blockquote p { font-size: 1.02rem; }
      section.cover ul { font-size: .88rem; line-height: 1.75; padding: 0; }
      section.cover pre { display: flex; width: 100%; margin-top: 24px; }
      section.cover pre > code { flex: 1; font-size: 11.5px; padding: 13px 14px; }
      section.cover .cover-actions { flex-direction: column; align-items: stretch; gap: 10px; margin-top: 22px; }
      section.cover .cover-main > p.cover-actions a { display: block; text-align: center; padding: 0.8em 1em; }
    }
  </style>
</head>
<body>
<div id="app">Loading nio-flow docs…</div>
<script>
  window.$docsify = {
    name: 'nioflow',
    coverpage: true,
    onlyCover: true,
    loadSidebar: true,
    loadNavbar: true,
    alias: { '/overview': '/README.md' },
    subMaxLevel: 2,
    auto2top: true,
    search: {
      placeholder: 'Search the docs…',
      noData: 'No results. Try another term.',
      depth: 3
    },
    copyCode: { buttonText: 'Copy', successText: 'Copied' },
    markdown: {
      renderer: {
        code: function (code, lang) {
          if (lang === 'mermaid') {
            return '<div class="mermaid">' + code + '</div>';
          }
          return this.origin.code.apply(this, arguments);
        }
      }
    },
    plugins: [
      function (hook) {
        hook.doneEach(function () {
          if (window.mermaid) {
            window.mermaid.run({ querySelector: '.mermaid' });
          }
        });
      },
      // Docsify clears the navbar on the cover-only route; keep it there.
      // Mirror of _navbar.md — update both together.
      function (hook) {
        var NAV = '<ul>'
            + '<li><a href="#/overview" title="Overview">Overview</a></li>'
            + '<li><a href="#/quickstart" title="Quickstart">Quickstart</a></li>'
            + '<li><a href="#/api-reference" title="API reference">API reference</a></li>'
            + '<li><a href="https://central.sonatype.com/artifact/dev.nioflow/nioflow-core" title="Maven Central">Maven Central</a></li>'
            + '<li><a class="nav-github" href="https://github.com/fabiangftech/nioflow" title="GitHub" aria-label="GitHub repository"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg></a></li>'
            + '</ul>';
        hook.doneEach(function () {
          var nav = document.querySelector('nav.app-nav');
          if (nav && !nav.querySelector('ul')) {
            nav.innerHTML = NAV;
          }
          if (nav && !nav.querySelector('.nav-brand')) {
            var brand = document.createElement('a');
            brand.className = 'nav-brand';
            brand.href = '#/';
            brand.innerHTML = 'nio<span>flow</span>';
            brand.setAttribute('aria-label', 'nio-flow home');
            nav.insertBefore(brand, nav.firstChild);
          }
          // The cover may render after this hook: try now and shortly after.
          injectCoverCopy();
          setTimeout(injectCoverCopy, 150);
          setTimeout(injectCoverCopy, 600);
        });

        // Direct copy on the cover's install one-liner.
        function injectCoverCopy() {
          var pre = document.querySelector('section.cover pre');
          if (!pre || pre.querySelector('.cover-copy')) {
            return;
          }
          var button = document.createElement('button');
          button.type = 'button';
          button.className = 'cover-copy';
          button.textContent = 'Copy';
          button.setAttribute('aria-label', 'Copy the Gradle dependency');
          button.addEventListener('click', function () {
            var snippet = pre.querySelector('code').innerText.trim();
            var confirm = function () {
              button.textContent = 'Copied';
              setTimeout(function () { button.textContent = 'Copy'; }, 1600);
            };
            var legacy = function () {
              var scratch = document.createElement('textarea');
              scratch.value = snippet;
              scratch.style.position = 'fixed';
              scratch.style.opacity = '0';
              document.body.appendChild(scratch);
              scratch.select();
              document.execCommand('copy');
              document.body.removeChild(scratch);
              confirm();
            };
            if (navigator.clipboard && navigator.clipboard.writeText) {
              navigator.clipboard.writeText(snippet).then(confirm, legacy);
            } else {
              legacy();
            }
          });
          pre.appendChild(button);
        }
      }
    ]
  };
</script>
<script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: 'base',
    fontFamily: 'Inter, sans-serif',
    themeVariables: {
      primaryColor: '#EEF2FF',
      primaryBorderColor: '#4F46E5',
      primaryTextColor: '#0F172A',
      secondaryColor: '#E0F7FA',
      secondaryBorderColor: '#0891B2',
      tertiaryColor: '#F1F5F9',
      tertiaryBorderColor: '#E2E8F0',
      lineColor: '#94A3B8',
      textColor: '#334155',
      fontSize: '13px',
      edgeLabelBackground: '#FFFFFF',
      actorBkg: '#EEF2FF',
      actorBorder: '#4F46E5',
      actorTextColor: '#0F172A',
      signalColor: '#475569',
      signalTextColor: '#475569',
      labelBoxBkgColor: '#F1F5F9',
      noteBkgColor: '#E0F7FA',
      noteBorderColor: '#0891B2',
      noteTextColor: '#0F172A'
    }
  });
</script>
<script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
<script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-java.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-groovy.min.js"></script>
<script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markup.min.js"></script>
